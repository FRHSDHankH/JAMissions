<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Films — Jalyn Anderson Mission Documentary Work" />
  <meta property="og:title" content="Films | Jalyn Anderson" />
  <title>Films | Jalyn Anderson</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>J</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="site-nav"></div>

  <header class="films-header text-center">
    <span class="label-badge">Films</span>
    <p class="label-text mt-2">Mission Documentary Work</p>
  </header>

  <hr class="section-divider" />

  <main id="films-app">

    <div v-for="(film, index) in films" :key="film.id" class="film-block">

      <!-- ─── Title ABOVE the media ─────────────────────────── -->
      <div class="film-title-above text-center py-4 fade-up">
        <p class="label-text mb-2">Film Title — "{{ film.locationLabel }}"</p>
        <span class="script-heading film-script-title">{{ film.title }}</span>
        <div class="mt-2">
          <span class="film-date-badge label-text">{{ film.dateLabel }}</span>
        </div>
      </div>

      <!-- ─── Video or image ───────────────────────────────── -->
      <div class="film-media-wrap">
        <template v-if="film.video">
          <video
            class="film-video"
            :src="film.video"
            :poster="film.thumbnail"
            controls
            playsinline
            preload="metadata"
          ></video>
        </template>
        <template v-else>
          <img :src="film.thumbnail" :alt="film.title" />
        </template>
      </div>

      <!-- ─── Description below ────────────────────────────── -->
      <div class="film-info text-center py-5 fade-up">
        <div class="film-description-card mx-auto">
          <p class="film-desc-text">{{ film.description }}</p>
        </div>
      </div>

      <hr v-if="index < films.length - 1" class="section-divider" />
    </div>

    <div v-if="films.length === 0" class="text-center py-5">
      <p class="label-text">Loading films...</p>
    </div>

  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="js/main.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() { return { films: [] }; },
      async mounted() {
        try {
          const res = await fetch('data/films.json');
          this.films = await res.json();
        } catch(e) { console.warn('Could not load films.json'); }
        this.$nextTick(() => { if (window.initFadeUp) window.initFadeUp(); });
      }
    }).mount('#films-app');
  </script>

  <style>
    .films-header {
      padding: 2.5rem 1rem 2rem;
      background: var(--bg-primary);
    }
    .film-block { background: var(--bg-primary); }

    /* Title above */
    .film-title-above {
      background: var(--bg-primary);
      padding-bottom: 1rem !important;
    }
    .film-script-title {
      display: block;
      font-size: clamp(2rem, 5vw, 3.8rem);
      color: var(--text-primary);
      line-height: 1.2;
    }

    /* Media block */
    .film-media-wrap {
      position: relative;
      width: 100%;
      height: 58vh;
      min-height: 320px;
      overflow: hidden;
      background: #000;
    }
    .film-media-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .film-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .film-date-badge {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 0.25rem 0.9rem;
      letter-spacing: 0.2em;
      font-size: 0.65rem;
    }
    .film-description-card {
      border: 1px solid var(--border);
      padding: 1.8rem 2.5rem;
      max-width: 560px;
    }
    .film-desc-text {
      font-family: var(--font-display);
      font-size: 0.95rem;
      line-height: 1.8;
      text-align: center;
      margin: 0;
    }

    @media (max-width: 768px) {
      .film-media-wrap { height: 52vw; min-height: 220px; }
      .film-description-card { padding: 1.2rem; margin: 0 1rem; }
    }
  </style>

</body>
</html>
