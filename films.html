<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Films — Jalyn Anderson Mission Documentary Work" />
  <meta property="og:title" content="Films | Jalyn Anderson" />
  <title>Films | Jalyn Anderson</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>J</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- NAV -->
  <div id="site-nav"></div>

  <!-- PAGE HEADER -->
  <header class="films-header text-center">
    <span class="label-badge">Films</span>
    <p class="label-text mt-2">Mission Documentary Work</p>
  </header>

  <hr class="section-divider" />

  <!-- PAGE -->
  <main id="films-app">

    <transition-group name="film-fade" tag="div">
      <div
        v-for="(film, index) in films"
        :key="film.id"
        class="film-block"
      >

        <!-- Full-width thumbnail -->
        <div class="film-thumb-wrap">
          <img :src="film.thumbnail" :alt="film.title" />
          <div class="film-thumb-overlay"></div>
          <div class="film-thumb-title">
            <span class="script-heading">{{ film.title }}</span>
          </div>
        </div>

        <!-- Film info -->
        <div class="film-info text-center py-5 fade-up">
          <p class="label-text mb-2">
            Film Title — "{{ film.locationLabel }}"
          </p>
          <span class="film-date-badge label-text">{{ film.dateLabel }}</span>
          <div class="film-description-card mx-auto mt-4">
            <p class="film-desc-text">{{ film.description }}</p>
          </div>
        </div>

        <hr v-if="index < films.length - 1" class="section-divider" />

      </div>
    </transition-group>

    <!-- Empty state -->
    <div v-if="films.length === 0" class="text-center py-5">
      <p class="label-text">Loading films...</p>
    </div>

  </main>

  <!-- FOOTER -->
  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="js/main.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          films: []
        };
      },
      async mounted() {
        try {
          const res = await fetch('data/films.json');
          this.films = await res.json();
        } catch(e) {
          console.warn('Could not load films.json');
        }

        this.$nextTick(() => {
          if (window.initFadeUp) window.initFadeUp();
        });
      }
    }).mount('#films-app');
  </script>

  <style>
    /* ── Films-specific styles ── */
    .films-header {
      padding: 2.5rem 1rem 2rem;
      background: var(--bg-primary);
    }

    .film-block {
      background: var(--bg-primary);
    }

    .film-info {
      background: var(--bg-primary);
    }

    .film-date-badge {
      display: inline-block;
      border: 1px solid var(--border);
      padding: 0.25rem 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      font-size: 0.65rem;
    }

    .film-description-card {
      border: 1px solid var(--border);
      padding: 1.8rem 2.5rem;
      max-width: 560px;
    }

    .film-desc-text {
      font-family: var(--font-display);
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--text-muted);
      text-align: center;
      margin: 0;
    }

    /* Vue transition */
    .film-fade-enter-active {
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .film-fade-enter-from {
      opacity: 0;
      transform: translateY(24px);
    }

    @media (max-width: 768px) {
      .film-description-card {
        padding: 1.2rem 1.2rem;
      }
    }
  </style>

</body>
</html>
