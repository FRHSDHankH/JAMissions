<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Photography — Jalyn Anderson Mission Documentary Work" />
  <meta property="og:title" content="Photography | Jalyn Anderson" />
  <title>Photography | Jalyn Anderson</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>J</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- NAV -->
  <div id="site-nav"></div>

  <!-- PAGE -->
  <main id="photos-app">

    <!-- ─── PAGE HEADER ──────────────────────────────────────── -->
    <header class="photos-header text-center">
      <span class="label-badge">Photography</span>
    </header>

    <!-- ─── VIEW TOGGLE ──────────────────────────────────────── -->
    <div class="toggle-wrap text-center mb-4">
      <button
        class="toggle-btn"
        :class="{ active: viewMode === 'grid' }"
        @click="viewMode = 'grid'"
      >
        ⊞ Grid
      </button>
      <button
        class="toggle-btn"
        :class="{ active: viewMode === 'carousel' }"
        @click="viewMode = 'carousel'"
      >
        ▷ Carousel
      </button>
    </div>

    <!-- ─── GRID VIEW ─────────────────────────────────────────── -->
    <section v-if="viewMode === 'grid'" class="photos-grid-section px-3 px-md-4 pb-5">
      <div class="row g-3">
        <div
          v-for="(photo, index) in photos"
          :key="'grid-' + photo.id"
          class="col-12 col-sm-6 col-md-4"
        >
          <div
            class="polaroid fade-up"
            :style="{ transitionDelay: (index * 0.05) + 's' }"
          >
            <img :src="photo.src" :alt="photo.alt" />
          </div>
        </div>
      </div>
    </section>

    <!-- ─── CAROUSEL VIEW ─────────────────────────────────────── -->
    <section v-if="viewMode === 'carousel'" class="photos-carousel-section pb-5">
      <div class="carousel-stage">

        <!-- Prev button -->
        <button class="carousel-arrow carousel-arrow-left" @click="prev" aria-label="Previous">
          ←
        </button>

        <!-- Image with transition -->
        <div class="carousel-img-wrap">
          <transition name="slide-fade" mode="out-in">
            <img
              :key="currentIndex"
              :src="photos[currentIndex].src"
              :alt="photos[currentIndex].alt"
              class="carousel-img"
            />
          </transition>
        </div>

        <!-- Next button -->
        <button class="carousel-arrow carousel-arrow-right" @click="next" aria-label="Next">
          →
        </button>

      </div>

      <!-- Counter + mission label -->
      <div class="text-center mt-4">
        <p class="label-text mb-1">
          {{ String(currentIndex + 1).padStart(2, '0') }} / {{ String(photos.length).padStart(2, '0') }}
        </p>
        <p class="label-text" style="color: var(--accent);">
          {{ photos[currentIndex].mission }}
        </p>
      </div>

      <!-- Dot indicators -->
      <div class="carousel-dots mt-3">
        <span
          v-for="(photo, index) in photos"
          :key="'dot-' + index"
          class="carousel-dot"
          :class="{ active: index === currentIndex }"
          @click="currentIndex = index"
        ></span>
      </div>

    </section>

    <!-- Loading state -->
    <div v-if="photos.length === 0" class="text-center py-5">
      <p class="label-text">Loading photos...</p>
    </div>

  </main>

  <!-- FOOTER -->
  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="js/main.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          photos: [],
          viewMode: 'grid',
          currentIndex: 0
        };
      },
      async mounted() {
        try {
          const res = await fetch('data/photos.json');
          this.photos = await res.json();
        } catch(e) {
          console.warn('Could not load photos.json');
        }

        this.$nextTick(() => {
          if (window.initFadeUp) window.initFadeUp();
        });
      },
      watch: {
        // Re-run fade-up when switching back to grid
        viewMode(val) {
          if (val === 'grid') {
            this.$nextTick(() => {
              if (window.initFadeUp) window.initFadeUp();
            });
          }
          // Reset carousel index when switching to carousel
          if (val === 'carousel') {
            this.currentIndex = 0;
          }
        }
      },
      methods: {
        prev() {
          this.currentIndex =
            (this.currentIndex - 1 + this.photos.length) % this.photos.length;
        },
        next() {
          this.currentIndex =
            (this.currentIndex + 1) % this.photos.length;
        }
      }
    }).mount('#photos-app');
  </script>

  <style>
    /* ── Photography-specific styles ── */
    .photos-header {
      padding: 2.5rem 1rem 1.5rem;
      background: var(--bg-primary);
    }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0 1rem 1.5rem;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-label);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      cursor: pointer;
      transition: color 0.25s, border-color 0.25s;
    }

    .toggle-btn.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    .toggle-btn:hover:not(.active) {
      color: var(--text-primary);
      border-color: var(--text-primary);
    }

    /* ── Grid ── */
    .photos-grid-section {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Carousel ── */
    .photos-carousel-section {
      width: 100%;
    }

    .carousel-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 3.5rem;
    }

    .carousel-img-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      min-height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
    }

    .carousel-img {
      width: 100%;
      max-height: 560px;
      object-fit: contain;
      display: block;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-label);
      font-size: 1rem;
      width: 40px;
      height: 40px;
      cursor: pointer;
      z-index: 10;
      transition: background 0.25s, border-color 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .carousel-arrow:hover {
      background: var(--text-primary);
      color: var(--bg-primary);
    }

    .carousel-arrow-left  { left: 0; }
    .carousel-arrow-right { right: 0; }

    /* Dots */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 2rem;
    }

    .carousel-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }

    .carousel-dot.active {
      background: var(--accent);
      transform: scale(1.4);
    }

    /* Slide transition — override position:absolute from global */
    .slide-fade-enter-active,
    .slide-fade-leave-active {
      transition: opacity 0.35s ease, transform 0.35s ease;
      position: relative !important;
    }
    .slide-fade-enter-from {
      opacity: 0;
      transform: translateX(40px);
    }
    .slide-fade-leave-to {
      opacity: 0;
      transform: translateX(-40px);
    }

    @media (max-width: 768px) {
      .carousel-stage {
        padding: 0 2.8rem;
      }
      .carousel-img-wrap {
        min-height: 260px;
      }
      .carousel-img {
        max-height: 360px;
      }
    }
  </style>

</body>
</html>
