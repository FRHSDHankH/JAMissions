<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Photography — Jalyn Anderson Mission Documentary Work" />
  <meta property="og:title" content="Photography | Jalyn Anderson" />
  <title>Photography | Jalyn Anderson</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>J</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="site-nav"></div>

  <main id="photos-app">

    <header class="photos-header text-center">
      <span class="label-badge">Photography</span>
    </header>

    <div class="toggle-wrap text-center mb-2">
      <button class="toggle-btn" :class="{ active: viewMode === 'grid' }" @click="switchMode('grid')">⊞ Grid</button>
      <button class="toggle-btn" :class="{ active: viewMode === 'carousel' }" @click="switchMode('carousel')">▷ Carousel</button>
    </div>

    <!-- ─── GRID VIEW ─────────────────────────────────────────── -->
    <section v-if="viewMode === 'grid'" class="photos-wall pb-5">
      <!-- Rows with varying counts: 4, 3, 5, 3, 4, 3, 5, 4, 3, ... -->
      <div
        v-for="(row, rowIndex) in photoRows"
        :key="'row-' + rowIndex"
        class="photo-row"
        :class="'row-count-' + row.length"
      >
        <div
          v-for="(photo, colIndex) in row"
          :key="'photo-' + photo.id"
          class="photo-row-item fade-up"
          :style="{
            transitionDelay: ((rowIndex * row.length + colIndex) * 0.025) + 's',
            transform: 'rotate(' + getRotation(photo.id) + 'deg)'
          }"
        >
          <div class="square-polaroid">
            <img :src="photo.src" :alt="photo.alt" loading="lazy" />
          </div>
        </div>
      </div>
    </section>

    <!-- ─── CAROUSEL VIEW ─────────────────────────────────────── -->
    <section v-if="viewMode === 'carousel'" class="photos-carousel-section pb-5">
      <div class="carousel-stage">
        <button class="carousel-arrow carousel-arrow-left" @click="prev">←</button>
        <div class="carousel-img-wrap">
          <transition name="slide-fade" mode="out-in">
            <img
              :key="currentIndex"
              :src="photos[currentIndex].src"
              :alt="photos[currentIndex].alt"
              class="carousel-img"
            />
          </transition>
        </div>
        <button class="carousel-arrow carousel-arrow-right" @click="next">→</button>
      </div>
      <div class="text-center mt-4">
        <p class="label-text mb-1">
          {{ String(currentIndex + 1).padStart(2, '0') }} / {{ String(photos.length).padStart(2, '0') }}
        </p>
        <p class="label-text" style="color: var(--accent);">{{ photos[currentIndex].mission }}</p>
      </div>
      <div class="carousel-dots mt-3">
        <span
          v-for="(photo, i) in photos"
          :key="'dot-' + i"
          class="carousel-dot"
          :class="{ active: i === currentIndex }"
          @click="currentIndex = i"
        ></span>
      </div>
    </section>

    <div v-if="photos.length === 0" class="text-center py-5">
      <p class="label-text">Loading photos...</p>
    </div>

  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="js/main.js"></script>
  <script>
    const { createApp } = Vue;

    // Row pattern: varying counts so no two consecutive rows are the same width
    const ROW_PATTERN = [4, 3, 5, 3, 4, 5, 3, 4, 3, 5, 4, 3, 5, 4, 3];

    // Deterministic rotation based on photo id — consistent across re-renders
    const ROTATIONS = [-1.8, 0.7, -0.4, 1.5, -1.1, 0.9, -1.6, 0.3,
                        1.2, -0.6, 1.8, -0.9, 0.5, -1.4, 1.0, -0.3,
                        1.6, -1.2, 0.8, -1.7, 0.4, -0.7, 1.3, -0.5];

    createApp({
      data() {
        return {
          photos: [],
          viewMode: 'grid',
          currentIndex: 0
        };
      },
      computed: {
        photoRows() {
          const rows = [];
          let i = 0;
          let patternIdx = 0;
          while (i < this.photos.length) {
            const count = ROW_PATTERN[patternIdx % ROW_PATTERN.length];
            rows.push(this.photos.slice(i, i + count));
            i += count;
            patternIdx++;
          }
          return rows;
        }
      },
      async mounted() {
        try {
          const res = await fetch('data/photos.json');
          this.photos = await res.json();
        } catch(e) { console.warn('Could not load photos.json'); }
        this.$nextTick(() => { if (window.initFadeUp) window.initFadeUp(); });
      },
      methods: {
        getRotation(id) {
          return ROTATIONS[(id - 1) % ROTATIONS.length];
        },
        switchMode(mode) {
          this.viewMode = mode;
          if (mode === 'carousel') this.currentIndex = 0;
          if (mode === 'grid') {
            this.$nextTick(() => { if (window.initFadeUp) window.initFadeUp(); });
          }
        },
        prev() {
          this.currentIndex = (this.currentIndex - 1 + this.photos.length) % this.photos.length;
        },
        next() {
          this.currentIndex = (this.currentIndex + 1) % this.photos.length;
        }
      }
    }).mount('#photos-app');
  </script>

  <style>
    .photos-header {
      padding: 2.5rem 1rem 1.2rem;
      background: var(--bg-primary);
    }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 0 1rem 1.5rem;
    }
    .toggle-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-label);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      cursor: pointer;
      transition: color 0.25s, border-color 0.25s;
    }
    .toggle-btn.active { color: var(--accent); border-color: var(--accent); }
    .toggle-btn:hover:not(.active) { color: var(--text-primary); border-color: var(--text-primary); }

    /* ── Wall layout ── */
    .photos-wall {
      padding: 0 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Each row is a flex row, centered, with gap between items */
    .photo-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    /* Each item takes equal share of row width based on count */
    .photo-row-item {
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.5s ease;
      will-change: transform;
    }

    /* Width per item depends on how many are in the row */
    .row-count-3 .photo-row-item { width: calc((100% - 40px) / 3); }
    .row-count-4 .photo-row-item { width: calc((100% - 60px) / 4); }
    .row-count-5 .photo-row-item { width: calc((100% - 80px) / 5); }

    .photo-row-item:hover {
      transform: rotate(0deg) scale(1.05) translateY(-5px) !important;
      z-index: 10;
      position: relative;
    }

    /* Square polaroid — equal padding on all 4 sides */
    .square-polaroid {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      padding: 8px;                   /* equal on all sides */
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.65);
      transition: box-shadow 0.3s ease;
    }

    .square-polaroid img {
      width: 100%;
      aspect-ratio: 1 / 1;           /* perfect square crop */
      object-fit: cover;
      display: block;
    }

    .photo-row-item:hover .square-polaroid {
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.85);
    }

    /* ── Carousel ── */
    .photos-carousel-section { width: 100%; }
    .carousel-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 3.5rem;
    }
    .carousel-img-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      min-height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
    }
    .carousel-img {
      width: 100%;
      max-height: 560px;
      object-fit: contain;
      display: block;
    }
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 1rem;
      width: 40px;
      height: 40px;
      cursor: pointer;
      z-index: 10;
      transition: background 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .carousel-arrow:hover { background: var(--text-primary); color: var(--bg-primary); }
    .carousel-arrow-left  { left: 0; }
    .carousel-arrow-right { right: 0; }
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 2rem;
    }
    .carousel-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      cursor: pointer;
      transition: background 0.25s, transform 0.25s;
    }
    .carousel-dot.active { background: var(--accent); transform: scale(1.4); }
    .slide-fade-enter-active,
    .slide-fade-leave-active {
      transition: opacity 0.35s ease, transform 0.35s ease;
      position: relative !important;
    }
    .slide-fade-enter-from { opacity: 0; transform: translateX(40px); }
    .slide-fade-leave-to   { opacity: 0; transform: translateX(-40px); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .row-count-5 .photo-row-item { width: calc((100% - 60px) / 4); }
    }
    @media (max-width: 680px) {
      .photos-wall { padding: 0 1rem; }
      .photo-row { gap: 10px; margin-bottom: 10px; }
      .row-count-3 .photo-row-item,
      .row-count-4 .photo-row-item,
      .row-count-5 .photo-row-item { width: calc((100% - 20px) / 3); }
      .photo-row-item:hover { transform: none !important; }
      .carousel-stage { padding: 0 2.5rem; }
      .carousel-img-wrap { min-height: 260px; }
    }
    @media (max-width: 420px) {
      .row-count-3 .photo-row-item,
      .row-count-4 .photo-row-item,
      .row-count-5 .photo-row-item { width: calc((100% - 10px) / 2); }
    }
  </style>

</body>
</html>
