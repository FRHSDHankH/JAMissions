<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Jalyn Anderson — Book a Mission Documentary" />
  <meta property="og:title" content="Contact | Jalyn Anderson" />
  <title>Contact | Jalyn Anderson</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>J</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- NAV -->
  <div id="site-nav"></div>

  <!-- PAGE -->
  <main id="contact-app">

    <!-- ─── PAGE HEADER ──────────────────────────────────────── -->
    <header class="contact-header text-center">
      <span class="label-badge-light">Contact — Book a Mission</span>
      <p class="label-text mt-3">Reach out for nonprofit mission documentation</p>
    </header>

    <hr class="section-divider" />

    <!-- ─── FORM + INFO ───────────────────────────────────────── -->
    <section class="page-section">
      <div class="container">
        <div class="row g-0 contact-card-wrap fade-up">

          <!-- LEFT: Form -->
          <div class="col-12 col-md-7 contact-form-col">

            <!-- Success message -->
            <div v-if="submitted" class="contact-success mb-4">
              <p>Message sent. I'll be in touch soon.</p>
            </div>

            <!-- Fields -->
            <div v-if="!submitted">

              <div class="contact-field">
                <label class="label-text">Name</label>
                <input
                  v-model="form.name"
                  type="text"
                  class="contact-input"
                  placeholder=""
                />
              </div>

              <div class="contact-field">
                <label class="label-text">Organization</label>
                <input
                  v-model="form.org"
                  type="text"
                  class="contact-input"
                  placeholder=""
                />
              </div>

              <div class="contact-field">
                <label class="label-text">Email</label>
                <input
                  v-model="form.email"
                  type="email"
                  class="contact-input"
                  placeholder=""
                />
              </div>

              <div class="contact-field">
                <label class="label-text">Message</label>
                <textarea
                  v-model="form.message"
                  class="contact-input contact-textarea"
                  placeholder=""
                ></textarea>
              </div>

              <!-- Validation error -->
              <p v-if="validationError" class="contact-error label-text mb-3">
                Please fill in all fields before sending.
              </p>

              <div
                class="btn-accent contact-submit"
                @click="submitForm"
              >
                Send Message →
              </div>

            </div>
          </div>

          <!-- RIGHT: Info -->
          <div class="col-12 col-md-5 contact-info-col">

            <div class="contact-info-block mb-4 fade-up" style="transition-delay:0.15s;">
              <p class="label-text mb-2">Direct Email</p>
              <a :href="'mailto:' + contact.email" class="contact-link">
                {{ contact.email }}
              </a>
            </div>

            <div class="contact-info-block mb-4 fade-up" style="transition-delay:0.25s;">
              <p class="label-text mb-2">LinkedIn</p>
              <a :href="'https://' + contact.linkedin" target="_blank" class="contact-link">
                {{ contact.linkedin }}
              </a>
            </div>

            <!-- Spacer to push Available For to bottom like wireframe -->
            <div class="contact-info-spacer"></div>

            <div class="contact-info-block fade-up" style="transition-delay:0.35s;">
              <p class="label-text mb-3">Available For</p>
              <p
                v-for="(item, index) in contact.availableFor"
                :key="index"
                class="contact-available-item"
              >
                {{ item }}
              </p>
            </div>

          </div>

        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="js/main.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          contact: {
            email: '',
            linkedin: '',
            availableFor: []
          },
          form: {
            name: '',
            org: '',
            email: '',
            message: ''
          },
          submitted: false,
          validationError: false
        };
      },
      async mounted() {
        try {
          const res = await fetch('data/contact.json');
          this.contact = await res.json();
        } catch(e) {
          console.warn('Could not load contact.json');
        }

        this.$nextTick(() => {
          if (window.initFadeUp) window.initFadeUp();
        });
      },
      methods: {
        submitForm() {
          this.validationError = false;

          const { name, org, email, message } = this.form;
          if (!name.trim() || !org.trim() || !email.trim() || !message.trim()) {
            this.validationError = true;
            return;
          }

          // No backend — just show success
          this.submitted = true;
        }
      }
    }).mount('#contact-app');
  </script>

  <style>
    /* ── Contact-specific styles ── */
    .contact-header {
      padding: 3rem 1rem 2rem;
      background: var(--bg-primary);
    }

    /* Card wrapper */
    .contact-card-wrap {
      border: 1px solid var(--border);
      overflow: hidden;
      max-width: 900px;
      margin: 0 auto;
    }

    /* Left column */
    .contact-form-col {
      padding: 3rem 2.5rem;
      background: var(--bg-primary);
      border-right: 1px solid var(--border);
    }

    /* Right column */
    .contact-info-col {
      padding: 3rem 2.5rem;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
    }

    .contact-info-spacer {
      flex: 1;
      min-height: 2rem;
    }

    /* Fields */
    .contact-field {
      margin-bottom: 2rem;
    }

    .contact-field label {
      display: block;
      margin-bottom: 0.5rem;
    }

    .contact-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-label);
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      padding: 0.5rem 0;
      outline: none;
      transition: border-color 0.25s;
    }

    .contact-input:focus {
      border-bottom-color: var(--accent);
    }

    .contact-textarea {
      height: 110px;
      resize: none;
      padding-top: 0.5rem;
    }

    /* Submit button */
    .contact-submit {
      width: 100%;
      text-align: center;
      padding: 0.85rem 1rem;
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
    }

    /* Validation error */
    .contact-error {
      color: #c0725a;
      letter-spacing: 0.1em;
      font-size: 0.65rem;
    }

    /* Success message */
    .contact-success {
      border: 1px solid var(--accent);
      padding: 1.2rem 1.5rem;
      color: var(--accent);
      font-family: var(--font-label);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Info column */
    .contact-info-block {
      margin-bottom: 0.5rem;
    }

    .contact-link {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--accent);
      transition: color 0.25s;
      word-break: break-all;
    }

    .contact-link:hover {
      color: var(--accent-hover);
    }

    .contact-available-item {
      font-family: var(--font-display);
      font-size: 0.95rem;
      color: var(--text-primary);
      line-height: 1.9;
      margin: 0;
      font-style: italic;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .contact-form-col {
        padding: 2rem 1.5rem;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .contact-info-col {
        padding: 2rem 1.5rem;
      }
      .contact-info-spacer {
        display: none;
      }
    }
  </style>

</body>
</html>
